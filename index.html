<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Journal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <span class="brand-mark">TJ</span>
          <div>
            <strong>Trading Journal</strong>
            <span>Manual review workspace</span>
          </div>
        </div>

        <nav class="nav-list" id="navList"></nav>

        <section class="sidebar-panel">
          <span class="eyebrow">Today</span>
          <strong id="sidebarPnl">$0.00</strong>
          <span id="sidebarMeta">No trades logged</span>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <span class="eyebrow" id="viewEyebrow">Journal</span>
            <h1 id="viewTitle">Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <span class="sync-pill" id="syncStatus">Saved locally</span>
            <button class="ghost-button" id="exportButton" type="button" title="Export journal data">Export</button>
            <label class="ghost-button import-label" title="Import journal data">
              Import
              <input id="importInput" type="file" accept="application/json" />
            </label>
            <button class="primary-button" id="newTradeButton" type="button">New Trade</button>
          </div>
        </header>

        <section id="appView" class="view"></section>
      </main>
    </div>

    <dialog id="tradeDialog" class="trade-dialog">
      <form method="dialog" id="tradeForm">
        <header class="dialog-header">
          <div>
            <span class="eyebrow" id="dialogMode">New Trade</span>
            <h2>Trade Entry</h2>
          </div>
          <button class="icon-button" data-close-dialog type="button" aria-label="Close">×</button>
        </header>

        <div class="trade-form-sections">
          <section class="form-section">
            <h3>Essentials</h3>
            <div class="form-grid compact-grid">
              <label>
                Open Date
                <input name="date" type="date" required />
              </label>
              <label>
                Close Date
                <input name="exitDate" type="date" />
              </label>
              <label>
                Symbol
                <input name="symbol" type="text" required placeholder="AAPL, ES, BTC" />
              </label>
              <label>
                Direction
                <select name="direction">
                  <option>Long</option>
                  <option>Short</option>
                </select>
              </label>
              <label>
                Strategy
                <select name="strategy"></select>
              </label>
            </div>
          </section>

          <section class="form-section">
            <h3>Execution</h3>
            <div class="form-grid compact-grid">
              <label>
                Entry
                <input name="entry" type="number" step="0.01" required />
              </label>
              <label>
                Exit
                <input name="exit" type="number" step="0.01" required />
              </label>
              <label>
                Size
                <input name="size" type="number" step="0.0001" required />
              </label>
              <label>
                Stop
                <input name="stop" type="number" step="0.01" />
              </label>
              <label>
                Target
                <input name="target" type="number" step="0.01" />
              </label>
              <label>
                Fees
                <input name="fees" type="number" step="0.01" value="0" />
              </label>
            </div>
          </section>

          <section class="form-section">
            <h3>Review</h3>
            <div class="form-grid compact-grid">
              <label>
                Quality
                <select name="quality">
                  <option>A+</option>
                  <option>A</option>
                  <option>B</option>
                  <option>C</option>
                  <option>Forced</option>
                </select>
              </label>
              <label>
                Mistake
                <select name="mistake">
                  <option>None</option>
                  <option>FOMO</option>
                  <option>Revenge trade</option>
                  <option>Moved stop</option>
                  <option>Exited early</option>
                  <option>Oversized</option>
                  <option>Overtraded</option>
                </select>
              </label>
              <label>
                Emotion
                <select name="emotion">
                  <option>Calm</option>
                  <option>Patient</option>
                  <option>Anxious</option>
                  <option>Greedy</option>
                  <option>Impatient</option>
                  <option>Confident</option>
                </select>
              </label>
              <label>
                Market
                <select name="market">
                  <option>Trending</option>
                  <option>Choppy</option>
                  <option>Volatile</option>
                  <option>Low volume</option>
                  <option>News day</option>
                </select>
              </label>
              <fieldset class="wide rule-fieldset">
                <legend>Strategy Checklist</legend>
                <div id="strategyRuleChecks"></div>
              </fieldset>
              <label class="wide">
                Trade Notes
                <textarea name="notes" rows="4" placeholder="Why did you enter? What happened? What would you improve?"></textarea>
              </label>
              <label class="checkbox-label">
                <input name="followedRules" type="checkbox" checked />
                Followed playbook rules
              </label>
              <label class="checkbox-label">
                <input name="reviewed" type="checkbox" />
                Mark reviewed
              </label>
            </div>
          </section>

          <details class="form-section">
            <summary>Advanced trade plan</summary>
            <div class="form-grid compact-grid">
              <label>
                Entry Time
                <input name="entryTime" type="time" required />
              </label>
              <label>
                Exit Time
                <input name="exitTime" type="time" />
              </label>
              <label>
                Asset Class
                <select name="assetClass">
                  <option>Stocks</option>
                  <option>Options</option>
                  <option>Futures</option>
                  <option>Forex</option>
                  <option>Crypto</option>
                </select>
              </label>
              <label>
                Account
                <input name="account" type="text" placeholder="Main, IRA, Prop" />
              </label>
              <label>
                Session
                <select name="session">
                  <option>Premarket</option>
                  <option>Open</option>
                  <option>Midday</option>
                  <option>Power hour</option>
                  <option>After hours</option>
                </select>
              </label>
              <label>
                Planned Entry
                <input name="plannedEntry" type="number" step="0.01" />
              </label>
              <label>
                Planned Stop
                <input name="plannedStop" type="number" step="0.01" />
              </label>
              <label>
                Planned Target
                <input name="plannedTarget" type="number" step="0.01" />
              </label>
              <label>
                Planned Risk $
                <input name="plannedRisk" type="number" step="0.01" />
              </label>
              <label>
                Actual Risk $
                <input name="actualRisk" type="number" step="0.01" />
              </label>
              <label class="wide">
                Partial Exits
                <input name="partials" type="text" placeholder="Example: 186.20@20, 187.10@40" />
              </label>
            </div>
          </details>

          <details class="form-section">
            <summary>Attachments and tags</summary>
            <div class="form-grid compact-grid">
              <label class="wide">
                Screenshot / Chart URL
                <input name="image" type="url" placeholder="Optional image link" />
              </label>
              <label class="wide">
                Upload Screenshot
                <input name="imageFile" type="file" accept="image/*" />
              </label>
              <label class="wide">
                Custom Tags
                <input name="customTags" type="text" placeholder="gap-up, vwap, news, failed-breakout" />
              </label>
            </div>
          </details>
        </div>

        <footer class="dialog-actions">
          <button class="danger-button" id="deleteTradeButton" type="button">Delete</button>
          <span></span>
          <button class="ghost-button" data-close-dialog type="button">Cancel</button>
          <button class="primary-button" id="saveTradeButton" type="submit">Save Trade</button>
        </footer>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
